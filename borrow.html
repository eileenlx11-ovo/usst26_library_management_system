<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>借阅管理 - 管理员</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sidebar">
        <h2>📚 图书馆管理系统</h2>
        <div class="user-panel">
            <div class="avatar" id="sidebarAvatar">?</div>
            <div class="user-name" id="sidebarUserName">当前用户</div>
            <div class="user-role" id="sidebarUserRole">角色</div>
            <div class="profile-actions">
                <button onclick="openProfileModal()">编辑个人信息</button>
            </div>
        </div>
        <a href="books.html">📖 图书管理</a>
        <a href="borrow.html" class="active">📋 借阅管理</a>
        <a href="readers.html">👥 读者管理</a>
        <a href="report.html">📊 统计报表</a>
        <a href="admin.html">🔐 系统安全</a>
    </div>
    <div class="main">
        <h1>📋 借阅记录</h1>
        <div class="card">
            <div class="action-bar">
                <input type="text" id="borrowSearch" class="search-box" placeholder="读者姓名或书名">
                <button onclick="searchBorrowRecords()">搜索</button>
            </div>
            <table class="data-table" id="borrowTable">
                <thead>
                    <tr><th>借阅ID</th><th>读者姓名</th><th>图书名称</th><th>借书日期</th><th>应还日期</th><th>状态</th><th>操作</th></tr>
                </thead>
                <tbody id="borrowListBody"></tbody>
            </table>
        </div>
    </div>
    <div class="footerbar" id="footerLogout">
        <div class="footer-info" id="footerUserInfo"></div>
        <button class="logout-button" onclick="logout()">退出登录</button>
    </div>
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3>个人信息管理</h3>
            <input type="hidden" id="profileOldUsername">
            <label>用户名</label><input type="text" id="profileUsername" placeholder="用户名">
            <label>新密码</label><input type="password" id="profilePassword" placeholder="不修改则留空">
            <div class="profile-upload">
                <label>头像</label>
                <div id="profileAvatarPreview">?</div>
                <input type="file" id="profileAvatarInput" accept="image/*" onchange="handleAvatarUpload(event)">
            </div>
            <div class="modal-buttons">
                <button onclick="closeProfileModal()">取消</button>
                <button id="profileCancelBtn" onclick="closeProfileModal()">取消</button>
                <button id="profileSaveBtn" class="success" onclick="saveProfile()">保存</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

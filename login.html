<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 图书馆管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-shell">
        <!-- 登录表单 -->
        <div class="login-card" id="loginForm">
            <h1>📚 图书馆管理系统</h1>
            <p>请选择登录角色，输入用户名和密码后进入系统。</p>
            <div class="form-grid">
                <label>角色
                    <select id="loginRole">
                        <option>系统管理员</option>
                        <option>图书管理员</option>
                        <option>读者</option>
                    </select>
                </label>
                <label>用户名
                    <input type="text" id="loginUsername" placeholder="请输入用户名">
                </label>
                <label>密码
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </label>
            </div>
            <div style="margin-top: 1.2rem;">
                <button onclick="login()" class="primary-btn" style="width:100%;">登录</button>
            </div>
            <p class="small-text">
                示例账号：admin / 123456、manager01 / 123456、reader01 / 123456
            </p>
            <p class="small-text form-switch">
                还没有账号？<a href="javascript:void(0)" onclick="showRegisterForm()">立即注册</a>
            </p>
        </div>

        <!-- 注册表单（默认隐藏） -->
        <div class="login-card" id="registerForm" style="display:none;">
            <h1>📝 账号注册</h1>
            <p>填写以下信息完成注册。</p>
            <div class="form-grid">
                <label>注册角色
                    <select id="regRole" onchange="onRegRoleChange()">
                        <option>读者</option>
                        <option>图书管理员</option>
                        <option>系统管理员</option>
                    </select>
                </label>
                <label>用户名
                    <input type="text" id="regUsername" placeholder="4-16位字母或数字">
                </label>
                <label>密码
                    <input type="password" id="regPassword" placeholder="请输入密码">
                </label>
                <label>确认密码
                    <input type="password" id="regPasswordConfirm" placeholder="请再次输入密码">
                </label>
            </div>
            <!-- 邀请码区域（管理员时才显示） -->
            <div id="inviteCodeSection" style="display:none; margin-top:1rem;">
                <label>邀请码
                    <input type="text" id="regInviteCode" placeholder="管理员注册需要邀请码">
                </label>
            </div>
            <div style="margin-top: 1.2rem;">
                <button onclick="register()" class="primary-btn" style="width:100%;">注册</button>
            </div>
            <p class="small-text">
                读者注册无需邀请码；图书管理员需要邀请码。
            </p>
            <p class="small-text form-switch">
                已有账号？<a href="javascript:void(0)" onclick="showLoginForm()">返回登录</a>
            </p>
        </div>
    </div>
    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="script.js"></script>
</body>
</html>

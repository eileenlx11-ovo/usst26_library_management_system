<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统安全 - 图书馆管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-mark">L</span>
                <div>
                    <strong>图书馆管理系统</strong>
                    <small>数据库原理大作业</small>
                </div>
            </div>
            <div class="user-panel">
                <div class="avatar" id="sidebarAvatar">?</div>
                <div class="user-name" id="sidebarUserName">当前用户</div>
                <div class="user-role" id="sidebarUserRole">未登录</div>
                <div class="profile-actions">
                    <button onclick="openProfileModal()">编辑个人信息</button>
                </div>
            </div>
            <nav class="nav-list" aria-label="主导航">
                <!-- JS动态渲染 -->
            </nav>
            <div class="sidebar-footer">
                <div class="footer-info" id="footerUserInfo"></div>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </aside>

        <!-- 内容区 -->
        <main class="content">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Library Management System</p>
                    <h1 id="pageTitle">🔐 系统安全</h1>
                </div>
            </header>

            <div class="admin-grid">
                <!-- 用户权限管理 -->
                <section class="panel">
                    <div class="panel-heading">
                        <h2>用户权限管理</h2>
                        <span>分配用户角色</span>
                    </div>
                    <div class="toolbar">
                        <button class="primary-btn" onclick="openRoleModal()">➕ 新增用户权限</button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>序号</th><th>用户名</th><th>角色</th><th>操作</th></tr></thead>
                            <tbody id="roleListBody"></tbody>
                        </table>
                    </div>
                </section>

                <!-- 分类管理 -->
                <section class="panel">
                    <div class="panel-heading">
                        <h2>图书分类管理</h2>
                        <span>Category 维护</span>
                    </div>
                    <form class="inline-form" onsubmit="event.preventDefault(); addCategory();">
                        <input id="newCategory" placeholder="新增分类名称" required>
                        <button class="primary-btn" type="submit">添加</button>
                    </form>
                    <div class="chip-list" id="categoryChipList"></div>
                </section>

                <!-- 借阅规则设置 -->
                <section class="panel">
                    <div class="panel-heading">
                        <h2>借阅规则设置</h2>
                        <span>配置借阅参数</span>
                    </div>
                    <div class="rule-row">
                        <label>最大借阅数量<input type="number" id="maxBorrow" min="1"></label>
                        <label>借阅天数<input type="number" id="borrowDays" min="1"></label>
                        <label>逾期费用（元/天）<input type="number" id="overdueFee" min="0" step="0.1"></label>
                    </div>
                    <div class="rule-row">
                        <label>最大续借次数<input type="number" id="maxRenewTimes" min="0"></label>
                        <label>续借天数<input type="number" id="renewDays" min="0"></label>
                    </div>
                    <button class="primary-btn" onclick="saveBorrowRules()">保存规则</button>
                </section>

                <!-- 数据备份与恢复 -->
                <section class="panel">
                    <div class="panel-heading">
                        <h2>数据备份与恢复</h2>
                        <span>本地存储操作</span>
                    </div>
                    <p style="margin-bottom:1rem;">备份到浏览器本地存储，支持一键恢复。</p>
                    <div class="action-bar">
                        <button class="primary-btn" onclick="backupData()">备份数据</button>
                        <button class="danger-btn" onclick="restoreDemoData()">恢复备份数据</button>
                    </div>
                </section>
            </div>

            <!-- 邀请码管理（全宽面板） -->
            <section class="panel">
                <div class="panel-heading">
                    <div>
                        <h2>🔑 邀请码管理</h2>
                        <p>生成和吊销注册邀请码。读者注册无需邀请码，图书管理员和系统管理员注册需要有效的邀请码。</p>
                    </div>
                </div>
                <div class="toolbar">
                    <label>目标角色
                        <select id="inviteCodeRole">
                            <option>图书管理员</option>
                            <option>系统管理员</option>
                        </select>
                    </label>
                    <label>最大使用次数
                        <input type="number" id="inviteCodeMaxUses" min="0" value="1" placeholder="0=不限" style="width:100px;">
                    </label>
                    <button class="primary-btn" onclick="generateInviteCode()">🎫 生成邀请码</button>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>邀请码</th><th>目标角色</th><th>使用量</th><th>状态</th><th>创建者</th><th>创建日期</th><th>操作</th></tr>
                        </thead>
                        <tbody id="inviteCodeListBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- 角色弹窗 -->
    <div id="roleModal" class="modal">
        <div class="modal-content">
            <h3 id="roleModalTitle">新增用户权限</h3>
            <input type="hidden" id="editRoleUsername">
            <label>用户名</label><input type="text" id="roleUsername" placeholder="请输入用户名">
            <label>角色</label>
            <select id="roleType">
                <option>系统管理员</option>
                <option>图书管理员</option>
                <option>读者</option>
            </select>
            <div class="modal-buttons">
                <button class="ghost-btn" onclick="closeRoleModal()">取消</button>
                <button class="primary-btn" onclick="saveRole()">保存</button>
            </div>
        </div>
    </div>

    <!-- 个人信息弹窗 -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3>个人信息管理</h3>
            <input type="hidden" id="profileOldUsername">
            <label>用户名</label><input type="text" id="profileUsername" placeholder="用户名">
            <label>新密码</label><input type="password" id="profilePassword" placeholder="不修改则留空">
            <div class="profile-upload">
                <label>头像</label>
                <div id="profileAvatarPreview">?</div>
                <input type="file" id="profileAvatarInput" accept="image/*" onchange="handleAvatarUpload(event)">
            </div>
            <div class="modal-buttons">
                <button class="ghost-btn" onclick="closeProfileModal()">取消</button>
                <button class="primary-btn" onclick="saveProfile()">保存</button>
            </div>
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="script.js"></script>
</body>
</html>
